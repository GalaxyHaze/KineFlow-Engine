[project]
name    = "my-game"
version = "0.1.0"

[build]
mode = "debug"          # "debug" | "release" | "profile"

[debug]
fps       = 60
inspector = true
pool      = 128         # MB — arena allocator

[release]
fps       = 120
pool      = 64

[runtime]
fixed = false           # true → dt constante no work()

[window]
title  = "my-game"
width  = 1280
height = 720
mode   = "windowed"     # "windowed" | "borderless" | "fullscreen"

[renderer]
backend = "opengl"      # "opengl" | "vulkan" | "metal" | "dx11"

[threads]
count       = 0         # 0 = auto (hardware_concurrency)
memory      = 512       #512kb para cada thread inicialmente
pool        = true      # activa o thread pool
pool-grow   = true      # pool pode crescer dinamicamente

[features]
audio     = false
physics   = false
ecs       = false
network   = false
json      = false
xml       = false
serialize = false
plugins   = false

[plugins]
allow-native = true     # permite .dll/.so assinados
allow-vm     = true     # permite bytecode Kalidous
strict-sign  = true     # rejeita plugins sem assinatura válida
path         = "plugins/"
sandbox      = true